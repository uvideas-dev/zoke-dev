services:
  - type: web
    name: zoke-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RENDER
        value: "true"
